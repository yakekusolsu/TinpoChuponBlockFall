<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>チンポチュポンブロックフォール</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #111;
            color: #fff;
            overflow: hidden;
            touch-action: none;
        }
        #game-board {
            border: 4px solid #333;
            background-color: #000;
            display: block;
        }
        
        /* 右側のサイドパネル（元のダークトーンに戻す） */
        .side-panel {
            width: 260px;
            background: #222;
            border: 2px solid #444;
            border-radius: 12px;
            padding: 16px;
            margin-left: 20px;
            color: #fff;
        }

        /* キャンペーンカード部分だけを白に */
        .arnazon-card {
            background: #ffffff; 
            border-radius: 8px;
            padding: 10px;
            color: #000;
            text-align: center;
            box-shadow: 0 4px 15px rgba(255, 165, 0, 0.2);
            border: 2px solid #ff9900;
            transition: all 0.3s ease;
            position: relative;
        }

        .arnazon-card.active {
            animation: pulse 1s infinite alternate;
            border-color: #ff0000;
            box-shadow: 0 0 20px rgba(255, 153, 0, 0.6);
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }

        .arnazon-card img {
            width: 100%;
            height: auto;
            border-radius: 4px;
            margin-bottom: 8px;
        }

        /* ホラー演出用の全画面レイヤー */
        #jumpscare-layer {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: black;
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }
        
        #jumpscare-layer img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        @media (max-width: 640px) {
            main { flex-direction: column !important; align-items: center !important; }
            .side-panel { margin-left: 0; margin-top: 20px; width: 100%; max-width: 300px; }
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen font-sans p-4">

    <!-- タイトルエリア -->
    <div class="text-center mb-8">
        <h1 class="text-3xl font-black text-pink-500 italic tracking-tighter" style="text-shadow: 2px 2px 0px #fff;">
            チンポチュポンブロックフォール
        </h1>
    </div>

    <main class="flex flex-row items-start justify-center">
        <!-- ゲーム本体 -->
        <div class="relative flex flex-col items-center">
            <!-- 情報表示エリア -->
            <div class="w-full flex justify-between items-center mb-2 px-1">
                <span class="text-yellow-400 font-bold text-lg">SCORE: <span id="score">0</span></span>
                <button id="start-btn" class="bg-blue-600 hover:bg-blue-500 text-white text-sm font-bold py-1.5 px-4 rounded-full shadow-lg transition-all active:scale-95">
                    START
                </button>
            </div>
            
            <canvas id="game-board" width="300" height="600" class="rounded shadow-2xl"></canvas>
        </div>

        <!-- 常時表示サイドパネル -->
        <div class="side-panel flex flex-col gap-4">
            <div class="text-sm text-gray-300 font-bold border-b border-gray-600 pb-2">
                キャンペーン情報
            </div>
            
            <!-- ここだけを白にする -->
            <div id="arnazon-ui" class="arnazon-card opacity-50 grayscale transition-all duration-500">
                <p class="text-[10px] font-bold text-gray-500 mb-1">1000点達成でプレゼント！？</p>
                <p class="text-xs font-black text-orange-600 mb-2">Arnazonギフトカード1000円分！？</p>
                <img src="arnazon.png" alt="Arnazon Gift Card" onerror="this.src='https://via.placeholder.com/300x180?text=Arnazon+Gift+Card'">
                
                <!-- プログレスバーエリア -->
                <div id="arnazon-progress-container" class="block">
                    <div class="w-full bg-gray-200 h-2 rounded-full mt-2 overflow-hidden">
                        <div id="arnazon-progress" class="bg-orange-500 h-full w-0 transition-all duration-300"></div>
                    </div>
                    <p id="arnazon-status" class="text-[10px] mt-1 font-bold text-gray-600">進捗: 0%</p>
                </div>

                <!-- 罠ボタン -->
                <button id="trap-btn" class="hidden w-full bg-orange-500 hover:bg-orange-600 text-white text-[10px] font-black py-2 mt-2 rounded shadow-sm transition-all animate-bounce">
                    クリックしてコードを入手しよう
                </button>
            </div>

            <div class="bg-black p-3 rounded border border-red-900 text-red-500 text-[10px] font-bold animate-pulse">
                WARNING: 1800点を超えると強制終了します。
            </div>

            <div class="text-[10px] text-gray-500 mt-auto">
                [←][→]移動 [↑]回転 [↓]加速<br>
                [SPACE]ハードドロップ
            </div>
        </div>
    </main>

    <!-- ホラー演出用レイヤー -->
    <div id="jumpscare-layer">
        <img src="hora.jpg" alt="Horror" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiPjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbGw9InJlZCIvPjx0ZXh0IHg9IjUwJSIgeT0iNTAlIiBmaWxsPSJ3aGl0ZSIgZm9udC1zaXplPSI0OCIgdGV4dC1hbmNob3I9Im1pZGRsZSI+SE9SQS5QTkcgTUlTU0lORzwvdGV4dD48L3N2Zz4='">
    </div>

    <!-- 音声リソース -->
    <audio id="bgm" src="yaju.mp3" loop></audio>
    <audio id="se-lock" src="key.mp3"></audio>
    <audio id="se-gya" src="gya.mp3"></audio>

    <script>
        const canvas = document.getElementById('game-board');
        const ctx = canvas.getContext('2d');
        ctx.scale(30, 30);

        const scoreElement = document.getElementById('score');
        const startBtn = document.getElementById('start-btn');
        const jumpscareLayer = document.getElementById('jumpscare-layer');
        
        const arnazonUI = document.getElementById('arnazon-ui');
        const arnazonProgressContainer = document.getElementById('arnazon-progress-container');
        const arnazonProgress = document.getElementById('arnazon-progress');
        const arnazonStatus = document.getElementById('arnazon-status');
        const trapBtn = document.getElementById('trap-btn');

        const bgm = document.getElementById('bgm');
        const seLock = document.getElementById('se-lock');
        const seGya = document.getElementById('se-gya');

        let isPlaying = false;
        let isScared = false;
        let animationId;
        let dropCounter = 0;
        let dropInterval = 1000;
        let lastTime = 0;

        function playAudio(audioElement) {
            if (audioElement) {
                audioElement.play().catch(e => console.log("Audio play failed"));
            }
        }

        function createMatrix(w, h) {
            const matrix = [];
            while (h--) matrix.push(new Array(w).fill(0));
            return matrix;
        }

        function createPiece(type) {
            if (type === 'T') return [[0, 0, 0], [1, 1, 1], [0, 1, 0]];
            if (type === 'O') return [[2, 2], [2, 2]];
            if (type === 'L') return [[0, 3, 0], [0, 3, 0], [0, 3, 3]];
            if (type === 'J') return [[0, 4, 0], [0, 4, 0], [4, 4, 0]];
            if (type === 'I') return [[0, 5, 0, 0], [0, 5, 0, 0], [0, 5, 0, 0], [0, 5, 0, 0]];
            if (type === 'S') return [[0, 6, 6], [6, 6, 0], [0, 0, 0]];
            if (type === 'Z') return [[7, 7, 0], [0, 7, 7], [0, 0, 0]];
        }

        const colors = [null, '#FF0D72', '#0DC2FF', '#0DFF72', '#F538FF', '#FF8E0D', '#FFE138', '#3877FF'];

        let board = createMatrix(10, 20);
        const player = { pos: { x: 0, y: 0 }, matrix: null, score: 0 };

        function drawMatrix(matrix, offset) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        ctx.fillStyle = colors[value];
                        ctx.fillRect(x + offset.x, y + offset.y, 1, 1);
                        ctx.strokeStyle = 'rgba(0,0,0,0.8)';
                        ctx.lineWidth = 0.05;
                        ctx.strokeRect(x + offset.x, y + offset.y, 1, 1);
                    }
                });
            });
        }

        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            drawMatrix(board, { x: 0, y: 0 });
            if (player.matrix) drawMatrix(player.matrix, player.pos);
        }

        function collide(board, player) {
            const m = player.matrix;
            const o = player.pos;
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 && (board[y + o.y] && board[y + o.y][x + o.x]) !== 0) return true;
                }
            }
            return false;
        }

        function merge(board, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) board[y + player.pos.y][x + player.pos.x] = value;
                });
            });
        }

        function rotate(matrix, dir) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
            }
            dir > 0 ? matrix.forEach(row => row.reverse()) : matrix.reverse();
        }

        function playerDrop() {
            player.pos.y++;
            if (collide(board, player)) {
                player.pos.y--;
                merge(board, player);
                seLock.currentTime = 0;
                playAudio(seLock);
                playerReset();
                arenaSweep();
                updateScore();
            }
            dropCounter = 0;
        }

        function playerHardDrop() {
            while (!collide(board, player)) player.pos.y++;
            player.pos.y--;
            merge(board, player);
            seLock.currentTime = 0;
            playAudio(seLock);
            playerReset();
            arenaSweep();
            updateScore();
            dropCounter = 0;
        }

        function playerMove(offset) {
            player.pos.x += offset;
            if (collide(board, player)) player.pos.x -= offset;
        }

        function playerReset() {
            const pieces = 'TJLOSZI';
            player.matrix = createPiece(pieces[pieces.length * Math.random() | 0]);
            player.pos.y = 0;
            player.pos.x = (board[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
            if (collide(board, player)) {
                board.forEach(row => row.fill(0));
                player.score = 0;
                updateScore();
            }
        }

        function playerRotate(dir) {
            const pos = player.pos.x;
            let offset = 1;
            rotate(player.matrix, dir);
            while (collide(board, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    rotate(player.matrix, -dir);
                    player.pos.x = pos;
                    return;
                }
            }
        }

        function arenaSweep() {
            let rowCount = 1;
            outer: for (let y = board.length - 1; y >= 0; --y) {
                for (let x = 0; x < board[y].length; ++x) {
                    if (board[y][x] === 0) continue outer;
                }
                const row = board.splice(y, 1)[0].fill(0);
                board.unshift(row);
                ++y;
                player.score += rowCount * 100;
                rowCount *= 2;
            }
        }

        function updateScore() {
            scoreElement.innerText = player.score;

            const progress = Math.min(100, (player.score / 1000) * 100);
            arnazonProgress.style.width = `${progress}%`;
            arnazonStatus.innerText = `進捗: ${Math.floor(progress)}%`;

            if (player.score >= 1000) {
                arnazonUI.classList.remove('opacity-50', 'grayscale');
                arnazonUI.classList.add('active');
                arnazonProgressContainer.classList.add('hidden');
                trapBtn.classList.remove('hidden');
            } else {
                arnazonUI.classList.add('opacity-50', 'grayscale');
                arnazonUI.classList.remove('active');
                arnazonProgressContainer.classList.remove('hidden');
                trapBtn.classList.add('hidden');
            }

            if (player.score >= 1800 && !isScared) {
                triggerJumpscare();
            }
        }

        function triggerJumpscare() {
            if (isScared) return;
            isScared = true;
            isPlaying = false;
            cancelAnimationFrame(animationId);
            bgm.pause();
            seGya.volume = 1.0;
            seGya.currentTime = 0;
            playAudio(seGya);
            jumpscareLayer.style.display = 'flex';
        }

        trapBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            triggerJumpscare();
        });

        function update(time = 0) {
            if (!isPlaying) return;
            const deltaTime = time - lastTime;
            lastTime = time;
            dropCounter += deltaTime;
            if (dropCounter > dropInterval) playerDrop();
            draw();
            animationId = requestAnimationFrame(update);
        }

        document.addEventListener('keydown', event => {
            if (!isPlaying) return;
            if (event.keyCode === 37) playerMove(-1);
            else if (event.keyCode === 39) playerMove(1);
            else if (event.keyCode === 40) playerDrop();
            else if (event.keyCode === 38) playerRotate(1);
            else if (event.keyCode === 32) playerHardDrop();
        });

        startBtn.addEventListener('click', () => {
            if (!isPlaying && !isScared) {
                isPlaying = true;
                startBtn.disabled = true;
                startBtn.classList.add('opacity-30', 'cursor-not-allowed');
                bgm.volume = 0.4;
                playAudio(bgm);
                playerReset();
                updateScore();
                lastTime = performance.now();
                update();
            }
        });

        draw();
    </script>
</body>
</html>
