<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>チンポチュポンブロックフォール</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #111;
            color: #fff;
            overflow: hidden; /* ホラー画像時のスクロール防止 */
            touch-action: none; /* スマホでのスワイプスクロール防止 */
        }
        #game-board {
            border: 2px solid #333;
            background-color: #000;
            display: block;
            margin: 0 auto;
        }
        
        /* ホラー演出用の全画面レイヤー */
        #jumpscare-layer {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: black;
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }
        
        #jumpscare-layer img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 画面いっぱいにドアップ表示 */
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen font-sans">

    <!-- ゲームUI -->
    <div id="ui-container" class="text-center w-full max-w-md p-4">
        <h1 class="text-2xl font-bold mb-4 text-pink-500">チンポチュポンブロックフォール</h1>
        
        <div class="flex justify-between items-start mb-4">
            <div class="text-left bg-gray-800 p-3 rounded">
                <p class="text-xl">SCORE: <span id="score" class="font-bold text-yellow-400">0</span></p>
                <p class="text-sm text-gray-400 mt-1">※1000点で何かが起きる…</p>
            </div>
            <button id="start-btn" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 px-4 rounded shadow-lg transition-colors">
                ゲームスタート
            </button>
        </div>

        <canvas id="game-board" width="300" height="600" class="rounded shadow-2xl"></canvas>
        
        <p class="mt-4 text-gray-400 text-sm">
            操作方法:<br>
            [←] [→] 移動 | [↑] 回転 | [↓] 落下 | [スペース] 一気に落下
        </p>
    </div>

    <!-- ホラー演出用レイヤー -->
    <div id="jumpscare-layer">
        <img src="hora.jpg" alt="Horror" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiPjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbGw9InJlZCIvPjx0ZXh0IHg9IjUwJSIgeT0iNTAlIiBmaWxsPSJ3aGl0ZSIgZm9udC1zaXplPSI0OCIgdGV4dC1hbmNob3I9Im1pZGRsZSI+SE9SQS5QTkcgTUlTU0lORzwvdGV4dD48L3N2Zz4='">
    </div>

    <!-- 音声リソース -->
    <!-- ※ローカルファイル参照のため、HTMLと同じ階層に配置してください -->
    <audio id="bgm" src="yaju.mp3" loop></audio>
    <audio id="se-lock" src="key.mp3"></audio>
    <audio id="se-gya" src="gya.mp3"></audio>

    <script>
        const canvas = document.getElementById('game-board');
        const ctx = canvas.getContext('2d');
        // 10x20のグリッドにするためにスケールを調整 (300/10 = 30, 600/20 = 30)
        ctx.scale(30, 30);

        const scoreElement = document.getElementById('score');
        const startBtn = document.getElementById('start-btn');
        const jumpscareLayer = document.getElementById('jumpscare-layer');

        const bgm = document.getElementById('bgm');
        const seLock = document.getElementById('se-lock');
        const seGya = document.getElementById('se-gya');

        // 音声の読み込みエラー回避用（ファイルが無くてもゲームは動くようにする）
        function playAudio(audioElement) {
            if (audioElement) {
                audioElement.play().catch(e => console.log("Audio file not found or blocked: " + audioElement.src));
            }
        }

        let isPlaying = false;
        let isScared = false;
        let animationId;

        // テトリス用マトリックス生成
        function createMatrix(w, h) {
            const matrix = [];
            while (h--) {
                matrix.push(new Array(w).fill(0));
            }
            return matrix;
        }

        // ブロック形状の定義
        function createPiece(type) {
            if (type === 'T') return [[0, 0, 0], [1, 1, 1], [0, 1, 0]];
            if (type === 'O') return [[2, 2], [2, 2]];
            if (type === 'L') return [[0, 3, 0], [0, 3, 0], [0, 3, 3]];
            if (type === 'J') return [[0, 4, 0], [0, 4, 0], [4, 4, 0]];
            if (type === 'I') return [[0, 5, 0, 0], [0, 5, 0, 0], [0, 5, 0, 0], [0, 5, 0, 0]];
            if (type === 'S') return [[0, 6, 6], [6, 6, 0], [0, 0, 0]];
            if (type === 'Z') return [[7, 7, 0], [0, 7, 7], [0, 0, 0]];
        }

        const colors = [
            null,
            '#FF0D72', // T
            '#0DC2FF', // O
            '#0DFF72', // L
            '#F538FF', // J
            '#FF8E0D', // I
            '#FFE138', // S
            '#3877FF'  // Z
        ];

        let board = createMatrix(10, 20);

        const player = {
            pos: { x: 0, y: 0 },
            matrix: null,
            score: 0
        };

        function drawMatrix(matrix, offset) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        ctx.fillStyle = colors[value];
                        ctx.fillRect(x + offset.x, y + offset.y, 1, 1);
                        
                        // ブロックの枠線
                        ctx.strokeStyle = 'rgba(0,0,0,0.5)';
                        ctx.lineWidth = 0.05;
                        ctx.strokeRect(x + offset.x, y + offset.y, 1, 1);
                    }
                });
            });
        }

        function draw() {
            // 背景クリア
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            drawMatrix(board, { x: 0, y: 0 });
            if (player.matrix) {
                drawMatrix(player.matrix, player.pos);
            }
        }

        // 衝突判定
        function collide(board, player) {
            const m = player.matrix;
            const o = player.pos;
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 &&
                        (board[y + o.y] && board[y + o.y][x + o.x]) !== 0) {
                        return true;
                    }
                }
            }
            return false;
        }

        // ブロックを盤面に固定
        function merge(board, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        board[y + player.pos.y][x + player.pos.x] = value;
                    }
                });
            });
        }

        // 回転処理
        function rotate(matrix, dir) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) {
                    [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
                }
            }
            if (dir > 0) {
                matrix.forEach(row => row.reverse());
            } else {
                matrix.reverse();
            }
        }

        function playerDrop() {
            player.pos.y++;
            if (collide(board, player)) {
                player.pos.y--;
                merge(board, player);
                
                // ブロック固定時のSE再生
                seLock.currentTime = 0;
                playAudio(seLock);
                
                playerReset();
                arenaSweep();
                updateScore();
            }
            dropCounter = 0;
        }

        function playerHardDrop() {
            while (!collide(board, player)) {
                player.pos.y++;
            }
            player.pos.y--;
            merge(board, player);
            
            // ブロック固定時のSE再生
            seLock.currentTime = 0;
            playAudio(seLock);
            
            playerReset();
            arenaSweep();
            updateScore();
            dropCounter = 0;
        }

        function playerMove(offset) {
            player.pos.x += offset;
            if (collide(board, player)) {
                player.pos.x -= offset;
            }
        }

        function playerReset() {
            const pieces = 'TJLOSZI';
            player.matrix = createPiece(pieces[pieces.length * Math.random() | 0]);
            player.pos.y = 0;
            player.pos.x = (board[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);

            // ゲームオーバー判定
            if (collide(board, player)) {
                board.forEach(row => row.fill(0));
                player.score = 0;
                updateScore();
            }
        }

        function playerRotate(dir) {
            const pos = player.pos.x;
            let offset = 1;
            rotate(player.matrix, dir);
            // 壁蹴り（Wall Kick）処理
            while (collide(board, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    rotate(player.matrix, -dir); // 回転キャンセル
                    player.pos.x = pos;
                    return;
                }
            }
        }

        // ライン消去とスコア加算
        function arenaSweep() {
            let rowCount = 1;
            outer: for (let y = board.length - 1; y >= 0; --y) {
                for (let x = 0; x < board[y].length; ++x) {
                    if (board[y][x] === 0) {
                        continue outer;
                    }
                }

                const row = board.splice(y, 1)[0].fill(0);
                board.unshift(row);
                ++y;

                player.score += rowCount * 100; // 1ライン100点、同時消しで倍増
                rowCount *= 2;
            }
        }

        // スコア更新とホラー演出トリガー
        function updateScore() {
            scoreElement.innerText = player.score;

            // スコア1800以上でホラー演出発動！
            if (player.score >= 1000 && !isScared) {
                triggerJumpscare();
            }
        }

        // ホラー演出関数
        function triggerJumpscare() {
            isScared = true;
            isPlaying = false;
            cancelAnimationFrame(animationId); // ゲームループ停止
            
            // BGM停止
            bgm.pause();
            
            // gya.mp3を大音量で再生
            seGya.volume = 1.0; 
            seGya.currentTime = 0;
            playAudio(seGya);

            // ホラー画像ドアップ表示
            jumpscareLayer.style.display = 'flex';
        }

        let dropCounter = 0;
        let dropInterval = 1000;
        let lastTime = 0;

        function update(time = 0) {
            if (!isPlaying) return;

            const deltaTime = time - lastTime;
            lastTime = time;

            dropCounter += deltaTime;
            if (dropCounter > dropInterval) {
                playerDrop();
            }

            draw();
            animationId = requestAnimationFrame(update);
        }

        // キーボード操作
        document.addEventListener('keydown', event => {
            if (!isPlaying) return;

            if (event.keyCode === 37) { // Left
                playerMove(-1);
            } else if (event.keyCode === 39) { // Right
                playerMove(1);
            } else if (event.keyCode === 40) { // Down
                playerDrop();
            } else if (event.keyCode === 38) { // Up
                playerRotate(1);
            } else if (event.keyCode === 32) { // Space
                playerHardDrop();
            }
        });

        // ゲームスタート
        startBtn.addEventListener('click', () => {
            if (!isPlaying && !isScared) {
                isPlaying = true;
                startBtn.disabled = true;
                startBtn.classList.add('opacity-50', 'cursor-not-allowed');
                
                // BGMループ再生
                bgm.volume = 0.5;
                playAudio(bgm);
                
                playerReset();
                updateScore();
                update();
            }
        });

        // 初期描画
        draw();
    </script>
</body>
</html>
